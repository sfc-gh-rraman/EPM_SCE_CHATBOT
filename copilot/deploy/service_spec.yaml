spec:
  containers:
    - name: sce-epm
      image: /SCE_EPM_DB/SPCS/SCE_EPM_IMAGES/sce-epm:latest
      env:
        SNOWFLAKE_DATABASE: SCE_EPM_DB
        SNOWFLAKE_SCHEMA: ATOMIC
        LOG_LEVEL: INFO
      resources:
        requests:
          memory: 2Gi
          cpu: 1
        limits:
          memory: 4Gi
          cpu: 2
      readinessProbe:
        port: 8080
        path: /health
  endpoints:
    - name: sce-epm-endpoint
      port: 8080
      public: true
